<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.5.0/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="./overviews/shared/modal.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/forum/img_base/favicon.ico" sizes="any">
    <link rel="shortcut icon" href="/forum/img_base/favicon.ico">
    <link rel="apple-touch-icon" href="/forum/img_base/favicon.ico">
    <title>Generals Forum - Goodgame Empire Tools & Simulators</title>
    <meta name="description"
        content="Generals Forum provides Goodgame Empire tools, calculators, simulators, event overviews, and practical guides in one place.">
    <link rel="canonical" href="https://generalscamp.github.io/forum/">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta property="og:title" content="Generals Forum">
    <meta property="og:description" content="Goodgame Empire Tools & Simulators">
    <meta property="og:image" content="https://generalscamp.github.io/forum/img_base/share-banner.webp">
    <meta property="og:url" content="https://generalscamp.github.io/forum/">
</head>

<body>
    <div class="container">
        <nav id="mainNav" class="main-nav">
            <div class="main-nav-left">
                <div class="main-nav-brand-cluster" aria-label="Generals Forum brand">
                    <span class="main-nav-brand">
                        <img src="./img_base/main_page/nav-logo.png" alt="GC logo">
                    </span>
                    <span class="main-nav-brand-text-wrap">
                        <span class="main-nav-brand-text">Generals Forum</span>
                        <span class="main-nav-brand-subtext">Tools & Simulators</span>
                    </span>
                </div>
            </div>
            <div class="nav-search-wrap">
                <input id="globalSearchInput" type="search" placeholder="Search:" aria-label="Search pages">
                <i class="bi bi-search nav-search-icon" aria-hidden="true"></i>
                <div id="searchSuggestions" class="search-suggestions"></div>
            </div>
            <button id="openVersionInfoBtn" class="nav-settings-btn nav-info-btn" type="button"
                aria-label="Open data versions">
                <i class="bi bi-info-circle-fill" aria-hidden="true"></i>
            </button>
            <button id="openSettingsBtn" class="nav-settings-btn" type="button" aria-label="Open settings">
                <i class="bi bi-gear-fill" aria-hidden="true"></i>
            </button>
        </nav>

        <main class="main-scroll">
            <h2 class="collapse-header"><span class="header-title">OVERVIEWS</span></h2>
            <div id="overviews" class="category-wrapper">
                <div class="category-grid"></div>
            </div>

            <h2 class="collapse-header"><span class="header-title">SIMULATORS</span></h2>
            <div id="simulators" class="category-wrapper">
                <div class="category-grid"></div>
            </div>

            <h2 class="collapse-header"><span class="header-title">CALCULATORS</span></h2>
            <div id="calculators" class="category-wrapper">
                <div class="category-grid"></div>
            </div>

        </main>

        <script type="module" src="main.js"></script>
    </div>
    <div id="settingsModal" class="gf-modal settings-modal" aria-hidden="true">
        <div class="gf-modal-backdrop" data-close-modal="1"></div>
        <div class="gf-modal-card settings-modal-card" role="dialog" aria-modal="true"
            aria-labelledby="settingsModalTitle">
            <div class="gf-modal-head settings-modal-head">
                <h3 id="settingsModalTitle" class="gf-modal-title">Settings</h3>
                <button id="closeSettingsBtn" class="gf-modal-close settings-close-btn" type="button"
                    aria-label="Close settings">
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </button>
            </div>
            <div class="settings-options">
                <section class="settings-group">
                    <div class="settings-group-body">
                        <label class="settings-option settings-option-game">
                            <span class="settings-option-title">Game</span>
                            <div class="settings-select-shell">
                                <select id="settingsSelectedGame" class="settings-select"
                                    aria-label="Choose game loader">
                                    <option value="empire">Empire (Browser)</option>
                                    <option value="e4k">Empire: Four Kingdoms (Mobile)</option>
                                </select>
                            </div>
                        </label>
                        <label class="settings-option settings-option-game">
                            <span class="settings-option-title">Language</span>
                            <div class="settings-select-shell">
                                <select id="settingsSelectedLanguage" class="settings-select"
                                    aria-label="Choose language"></select>
                            </div>
                        </label>
                        <label class="settings-option">
                            <span>Developer Comments</span>
                            <input id="settingsDevComments" type="checkbox">
                        </label>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="versionInfoModal" class="gf-modal version-info-modal" aria-hidden="true">
        <div class="gf-modal-backdrop" data-close-modal="1"></div>
        <div class="gf-modal-card version-info-modal-card" role="dialog" aria-modal="true"
            aria-labelledby="versionInfoModalTitle">
            <div class="gf-modal-head version-info-modal-head">
                <h3 id="versionInfoModalTitle" class="gf-modal-title">Data versions</h3>
                <button id="closeVersionInfoBtn" class="gf-modal-close" type="button" aria-label="Close data versions">
                    <i class="bi bi-x-lg" aria-hidden="true"></i>
                </button>
            </div>
            <div class="gf-modal-body version-info-body">
                <div id="versionInfoStatus" class="version-info-status" role="status" hidden>
                    <span class="version-info-loader" aria-hidden="true"></span>
                    <span>Loading current versions…</span>
                </div>
                <div id="versionInfoList" class="version-info-list" aria-live="polite"></div>
                <div class="version-info-footer">
                    <a class="version-info-download-link" href="./others/assets_downloader/index.html">
                        <span id="versionInfoDownloaderLabel">Assets Downloader</span>
                    </a>
                    <div id="versionInfoUpdated" class="version-info-updated" hidden></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./overviews/shared/ConsentInit.mjs"></script>
</body>

</html>
