<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGE Imperial Patronage Simulator</title>
  <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="../../overviews/shared/shared.css">
  <link rel="stylesheet" href="../../overviews/shared/modal.css">
  <link rel="stylesheet" href="../../overviews/shared/reward-detail.css">
  <link rel="stylesheet" href="styles.css">
  <meta property="og:title" content="Imperial Patronage Simulator | Generals Forum">
  <meta property="og:description"
    content="Simulate Imperial Patronage donations, thresholds, and rewards with live in-game data.">
  <meta property="og:image" content="https://generalscamp.github.io/forum/img_base/patronage-icon.webp">
</head>

<body>
  <div class="container patronage-container">
    <div class="row">
      <div class="col-12">
        <div class="page-title">
          <h1>IMPERIAL PATRONAGE SIMULATOR</h1>
        </div>

        <div id="topButtonsContainer">
          <button id="rewardListBtn" class="home-icon-link patronage-list-button" type="button"
            aria-label="Open reward list" title="Reward list">
            <div class="home-icon">
              <i class="bi bi-list-stars"></i>
            </div>
          </button>
          <a href="https://generalscamp.github.io/forum/" class="home-icon-link" aria-label="Back to homepage">
            <div class="home-icon">
              <i class="bi bi-house"></i>
            </div>
          </a>
        </div>

        <div class="row note gx-1 gy-1 align-items-center pb-2 patronage-toolbar">
          <div class="col-6">
            <select id="typeSelect" class="form-select custom-select text-center"
              aria-label="Donation category selector">
              <option selected>Loading types...</option>
            </select>
          </div>
          <div class="col-6">
            <select id="setSelect" class="form-select custom-select text-center"
              aria-label="Reward set selector">
              <option selected>Loading versions...</option>
            </select>
          </div>
        </div>

        <section id="content" class="event-layout" style="display:none;">
          <div class="simulator-frame">
            <section class="donation-panel" aria-labelledby="donationPanelTitle">
              <div id="donationRows" class="donation-rows"></div>

              <div class="panel-footer row gx-2 gy-0">
                <div class="col-6 col-md-4 panel-footer-reset-sliders">
                  <button id="resetSlidersBtn" class="action-button secondary w-100" type="button">Reset
                    Sliders</button>
                </div>
                <div class="col-6 col-md-4 panel-footer-reset-progress">
                  <button id="resetStagedBtn" class="action-button secondary w-100" type="button">Reset All</button>
                </div>
                <div class="col-12 col-md-4 panel-footer-donate">
                  <button id="donateBtn" class="action-button primary w-100" type="button">Donate</button>
                </div>
              </div>
            </section>

            <aside class="reward-panel" aria-labelledby="rewardPanelTitle">
              <div class="reward-layout">
                <div class="reward-mobile-sticky">
                  <div class="reward-mobile-stats">
                    <strong id="mobileCurrentPointsValue">0</strong>
                    <strong id="mobilePointsToNextValue">0</strong>
                  </div>

                  <div class="reward-meter">
                    <div class="reward-meter-rail">
                      <div id="rewardMeterFill" class="reward-meter-fill"></div>
                      <div id="rewardMeterStagedFill" class="reward-meter-fill reward-meter-fill-staged"></div>
                      <span id="rewardMeterLevelGain" class="reward-meter-level-gain" aria-hidden="true"></span>
                    </div>
                  </div>
                </div>

                <div class="reward-cards">
                  <div class="reward-points-box d-flex align-items-baseline gap-2">
                    <span class="reward-points-title">Points for next level:</span>
                    <strong id="pointsToNextValue">0</strong>
                  </div>

                  <div id="rewardCardsStack" class="reward-cards-stack">
                    <article id="nextRewardCard" class="reward-card next">
                      <div id="nextRewardName" class="reward-name"></div>
                      <div id="nextRewardLevelLabel" class="reward-level">Next Level</div>
                      <div class="reward-art-shell">
                        <img id="nextRewardImage" class="reward-art" src="../../img_base/placeholder.webp" alt="">
                      </div>
                    </article>

                    <article id="currentRewardCard" class="reward-card current">
                      <div id="currentRewardName" class="reward-name"></div>
                      <div id="currentRewardLevelLabel" class="reward-level">Current Level</div>
                      <div class="reward-art-shell">
                        <img id="currentRewardImage" class="reward-art" src="../../img_base/placeholder.webp" alt="">
                      </div>
                    </article>
                  </div>

                  <div class="reward-progress-box d-flex align-items-baseline gap-2">
                    <span class="reward-points-title">Current points:</span>
                    <strong id="rewardPreviewTotal">0</strong>
                    <span id="rewardWarning" class="reward-warning"></span>
                  </div>
                </div>
              </div>
            </aside>
          </div>
        </section>

      </div>
    </div>
  </div>

  <div id="rewardListModal" class="gf-modal patronage-reward-modal" aria-hidden="true">
    <div class="gf-modal-backdrop" data-close-modal="1"></div>
    <div class="gf-modal-card patronage-reward-modal-card" role="dialog" aria-modal="true"
      aria-labelledby="rewardListModalTitle">
      <div class="gf-modal-head patronage-reward-modal-head">
        <h2 id="rewardListModalTitle" class="gf-modal-title">Patronage Reward List</h2>
        <button type="button" class="gf-modal-close patronage-reward-modal-close" aria-label="Close">
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
      </div>
      <div id="rewardListModalBody" class="gf-modal-body patronage-reward-modal-body"></div>
    </div>
  </div>

  <div id="patronageGameChoiceModal" class="gf-modal patronage-game-choice-modal" aria-hidden="true">
    <div class="gf-modal-backdrop"></div>
    <div class="gf-modal-card patronage-game-choice-modal-card" role="dialog" aria-modal="true"
      aria-labelledby="patronageGameChoiceTitle">
      <div class="gf-modal-head patronage-game-choice-modal-head">
        <h2 id="patronageGameChoiceTitle" class="gf-modal-title">Choose game</h2>
      </div>
      <div class="gf-modal-body patronage-game-choice-modal-body">
        <p id="patronageGameChoiceText" class="patronage-game-choice-text">
          EM (computer) and E4K (mobile) games may use different data. Choose your game.
        </p>
        <select id="patronageGameChoiceSelect" class="form-select custom-select patronage-game-choice-select"
          aria-label="Choose game">
          <option value="empire">Empire (Browser)</option>
          <option value="e4k">Empire: Four Kingdoms (Mobile)</option>
        </select>
        <button id="patronageGameChoiceContinue" class="action-button primary patronage-game-choice-continue"
          type="button">Continue</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="script.js"></script>
  <script type="module" src="../../overviews/shared/ConsentInit.mjs"></script>
</body>

</html>
