<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGE HoL Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.5.0/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="../../overviews/shared/shared.css">
    <link rel="stylesheet" href="./styles.css">
    <meta property="og:title" content="Hall of Legends Simulator | Generals Forum">
    <meta property="og:description" content="Try point allocations without spending rubies.">
    <meta property="og:image"
        content="https://generalscamp.github.io/forum/img_base/main_page/hall-of-legends-simulator-icon.webp">
</head>

<body>
    <div class="container hol-simulator-page">
        <div id="topButtonsContainer">
            <a href="https://generalscamp.github.io/forum/" class="home-icon-link" aria-label="Home">
                <div class="home-icon">
                    <i class="bi bi-house"></i>
                </div>
            </a>
        </div>

        <div class="row note hol-filter-bar gx-1 gy-1 align-items-center">
            <div class="col-6">
                <select id="tree-select" class="form-select custom-select text-center" aria-label="Skill tree selector">
                    <option id="attack-option" value="attack" selected>Attack · 0</option>
                    <option id="defense-option" value="defense">Defense · 0</option>
                </select>
            </div>
            <div class="col-6">
                <button id="reset-button" class="btn custom-select w-100" type="button" aria-label="Reset">
                    <span id="reset-button-label">Reset</span>
                </button>
            </div>
            <div class="col-12 total-points-col">
                <div class="text-center total-points-display">
                    <span><span id="total-allocated-label">Total Allocated Points:</span> <span id="total-allocated-points">0</span></span>
                </div>
            </div>
            <div class="col-12 description-col">
                <div class="details d-flex justify-content-center">
                    <span id="details-text">Click on a skill to view its description.</span>
                </div>
            </div>
        </div>

        <main id="content" class="container-fluid">
            <section class="hol-shell">
                <div class="hol-board">
                    <div class="accordion scrollable-content" aria-live="polite">
                        <div id="attack-container" class="containerr active"></div>
                        <div id="defense-container" class="containerr"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="./script.js"></script>
    <script type="module" src="../../overviews/shared/ConsentInit.mjs"></script>
</body>

</html>
