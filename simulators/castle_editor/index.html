<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GGE Castle Layout Editor</title>
  <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
  <meta property="og:title" content="Castle Layout Simulator | Generals Forum">
  <meta property="og:description" content="Design and manage your castle layouts manually or automatically.">
  <meta property="og:image"
    content="https://generalscamp.github.io/forum/img_base/main_page/layout-icon.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../../overviews/shared/modal.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="castle-app">
    <section class="board-shell" aria-label="Castle layout" data-i18n-aria="castle_layout">
      <canvas id="castleCanvas"></canvas>
    </section>
    <div id="buildingsModal" class="gf-modal castle-buildings-modal" aria-hidden="true">
      <div class="gf-modal-backdrop" data-close-modal="1"></div>
      <div class="gf-modal-card castle-buildings-modal-card" role="dialog" aria-modal="true"
        aria-labelledby="buildingsModalTitle">
        <div class="gf-modal-head">
          <h2 id="buildingsModalTitle" class="gf-modal-title" data-i18n="buildings">Buildings</h2>
          <button id="sidebarClose" class="gf-modal-close" type="button" aria-label="Close buildings"
            data-i18n-aria="close_buildings">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </div>
        <div id="buildingCatalogView" class="gf-modal-body castle-buildings-modal-body">
          <div class="building-filter-bar">
            <input id="buildingSearch" class="form-control custom-input" type="search"
              placeholder="Search by name" aria-label="Search by name"
              data-i18n-placeholder="search_by_name" data-i18n-aria="search_by_name">
            <div class="dropdown size-filter-dropdown">
              <button id="sizeDropdown" class="btn btn-custom dropdown-toggle w-100" type="button"
                aria-expanded="false" aria-controls="sizeFilters" data-i18n="size_filter">Size Filter</button>
              <ul id="sizeFilters" class="dropdown-menu dropdown-menu-custom w-100" hidden></ul>
            </div>
          </div>
          <div id="buildingList" class="building-list" aria-live="polite"></div>
        </div>
        <form id="customDecoForm" class="gf-modal-body custom-deco-form" hidden>
          <div class="custom-deco-apply-bar">
            <button id="customDecoCancel" class="custom-deco-action custom-deco-cancel" type="button"
              data-i18n="cancel">Cancel</button>
            <button class="custom-deco-add" type="submit" data-i18n="update_custom_buildings">Update custom buildings</button>
          </div>
          <div id="customDecoRows" class="custom-deco-id-grid"></div>
        </form>
        <button id="customDecoToggle" class="custom-deco-floating" type="button"
          aria-label="Add custom building" data-i18n-aria="add_custom_decoration">
          <i class="bi bi-plus-lg" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div id="savesModal" class="gf-modal castle-saves-modal" aria-hidden="true">
      <div class="gf-modal-backdrop" data-close-modal="1"></div>
      <div class="gf-modal-card castle-saves-modal-card" role="dialog" aria-modal="true"
        aria-labelledby="savesModalTitle">
        <div class="gf-modal-head">
          <h2 id="savesModalTitle" class="gf-modal-title" data-i18n="save_load_layouts">Save &amp; Load Layouts</h2>
          <button class="gf-modal-close" type="button" aria-label="Close saves" data-i18n-aria="close_saves">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </div>
        <div class="gf-modal-body castle-saves-modal-body">
          <div class="layout-save-bar">
            <input id="layoutNameInput" class="form-control slot-name" type="text"
              placeholder="Name your layout before saving" aria-label="Layout name"
              data-i18n-placeholder="layout_name_placeholder" data-i18n-aria="layout_name">
            <button id="saveLayoutButton" class="save-button" type="button" data-i18n="save">Save</button>
          </div>
          <div class="saved-layouts-head" aria-hidden="true">
            <span data-i18n="name">Name</span>
            <span data-i18n="active">Active</span>
            <span data-i18n="update">Update</span>
            <span data-i18n="delete">Delete</span>
          </div>
          <div id="savedLayoutsList" class="saved-layouts-list"></div>
        </div>
      </div>
    </div>

    <div id="settingsModal" class="gf-modal castle-settings-modal" aria-hidden="true">
      <div class="gf-modal-backdrop" data-close-modal="1"></div>
      <div class="gf-modal-card castle-settings-modal-card" role="dialog" aria-modal="true"
        aria-labelledby="settingsModalTitle">
        <div class="gf-modal-head">
          <h2 id="settingsModalTitle" class="gf-modal-title" data-i18n="settings">Settings</h2>
          <button class="gf-modal-close" type="button" aria-label="Close settings" data-i18n-aria="close_settings">
            <i class="bi bi-x-lg" aria-hidden="true"></i>
          </button>
        </div>
        <div class="gf-modal-body castle-settings-modal-body">
          <label class="castle-setting-row" for="expansionSelect">
            <span data-i18n="castle_expansions">Castle expansions</span>
            <select id="expansionSelect" class="form-select custom-select text-center" aria-label="Castle expansions"
              data-i18n-aria="castle_expansions">
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </label>
          <label class="castle-setting-row" for="backgroundSelect">
            <span data-i18n="castle_background">Castle background</span>
            <select id="backgroundSelect" class="form-select custom-select text-center" aria-label="Castle background"
              data-i18n-aria="castle_background">
              <option value="">Background</option>
            </select>
          </label>
          <div class="castle-setting-row">
            <span data-i18n="display_mode">Display mode</span>
            <select id="fullscreenSelect" class="form-select custom-select text-center" aria-label="Display mode"
              data-i18n-aria="display_mode">
              <option value="off">Windowed</option>
              <option value="on">Fullscreen</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <nav class="bottom-buttons-container d-flex justify-content-center align-items-center" aria-label="Editor navigation"
      data-i18n-aria="editor_navigation">
      <button id="sidebarToggle" class="btn" type="button" aria-label="Open buildings" data-i18n-aria="open_buildings">
        <i class="bi bi-hammer fs-1" aria-hidden="true"></i>
      </button>
      <div class="vr mx-2" aria-hidden="true"></div>
      <button id="savesToggle" class="btn" type="button" aria-label="Open saves" data-i18n-aria="open_saves">
        <i class="bi bi-save fs-1" aria-hidden="true"></i>
      </button>
      <div class="vr mx-2" aria-hidden="true"></div>
      <button id="overviewToggle" class="btn" type="button" aria-label="Switch to overview">
        <i class="bi bi-grid-3x3-gap fs-1" aria-hidden="true"></i>
      </button>
      <div class="vr mx-2" aria-hidden="true"></div>
      <button id="settingsToggle" class="btn" type="button" aria-label="Settings">
        <i class="bi bi-gear fs-1" aria-hidden="true"></i>
      </button>
    </nav>
  </main>
  <script type="module" src="script.js"></script>
  <script type="module" src="../../overviews/shared/ConsentInit.mjs"></script>
</body>
</html>
