<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGE Collector Event Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="../shared/calculators-shared.css">
    <link rel="stylesheet" href="styles.css">
    <meta property="og:title" content="Collector Event Calculator | Generals Forum">
    <meta property="og:description" content="Calculate that how many points you need to reach your goal.">
    <meta property="og:image" content="https://generalscamp.github.io/forum/img_base/main_page/collector-icon.webp">
</head>

<body>

    <div class="container">
        <h1 data-i18n="page_title">COLLECTOR EVENT CALCULATOR</h1>
        <div class="row">
            <a href="https://generalscamp.github.io/forum/" class="home-icon-link">
                <div class="home-icon">
                    <i class="bi bi-house"></i>
                </div>
            </a>

            <div class="col-12 collapse-area mb-2">
                <h2 class="collapse-header">
                    <span class="header-title" data-i18n="input">INPUT</span>
                </h2>
                <div class="collapse show">
                    <form class="calculator-bonuses-form">

                        <div class="col-12 form-group">
                            <label for="pgge-points" data-i18n="target_points">How many points do you want at the end?</label>
                            <input type="number" id="pgge-points" class="form-control" placeholder="e.g., 80000"
                                data-i18n-placeholder="target_points_placeholder" min="0"
                                max="100000" step="1000">
                        </div>

                        <div class="col-12 form-group">
                            <label for="pgge-time" data-i18n="days_remaining">Days left until the end of the event:</label>
                            <input type="number" id="pgge-time" class="form-control" placeholder="e.g., 4 days"
                                data-i18n-placeholder="days_remaining_placeholder" min="0"
                                max="7" step="1">
                        </div>

                    </form>
                </div>
            </div>

            <div class="col-12 collapse-area">
                <h2 class="collapse-header">
                    <span class="header-title" data-i18n="results">RESULTS</span>
                </h2>
                <div class="collapse show results">
                    <p class="il" id="result" data-i18n="result_empty">Enter the target points and remaining days.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="../../overviews/shared/ConsentInit.mjs"></script>
</body>

</html>
