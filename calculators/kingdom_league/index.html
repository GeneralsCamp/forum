<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom League Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../../overviews/shared/consent.css">
    <meta property="og:title" content="Kingdom League Calculator | Generals Forum">
    <meta property="og:description"
        content="Calculate your Kingdom League points, current title, and next rank requirements.">
    <meta property="og:image" content="https://generalscamp.github.io/forum/img_base/main_page/leauge-icon.webp">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1>KINGDOM LEAGUE CALCULATOR</h1>
            </div>

            <a href="https://generalscamp.github.io/forum/" class="home-icon-link" aria-label="Back to homepage">
                <div class="home-icon">
                    <i class="bi bi-house"></i>
                </div>
            </a>

            <div class="col-12 collapse-area mb-2">
                <h2 class="collapse-header"><span class="header-title">MEDAL INPUT</span></h2>
                <div class="collapse show">
                    <form id="leagueForm" class="calculator-bonuses-form row" onsubmit="return false;">
                        <div class="col-6 col-md-4 col-xl-3 form-group">
                            <label for="gold">Gold medal</label>
                            <input id="gold" type="number" class="form-control medal-input" min="0" step="1" value="0">
                        </div>
                        <div class="col-6 col-md-4 col-xl-3 form-group">
                            <label for="silver">Silver medal</label>
                            <input id="silver" type="number" class="form-control medal-input" min="0" step="1"
                                value="0">
                        </div>
                        <div class="col-6 col-md-4 col-xl-3 form-group">
                            <label for="bronze">Bronze medal</label>
                            <input id="bronze" type="number" class="form-control medal-input" min="0" step="1"
                                value="0">
                        </div>
                        <div class="col-6 col-md-4 col-xl-3 form-group">
                            <label for="glass">Glass medal</label>
                            <input id="glass" type="number" class="form-control medal-input" min="0" step="1" value="0">
                        </div>
                        <div class="col-6 col-md-4 col-xl-3 form-group">
                            <label for="copper">Copper medal</label>
                            <input id="copper" type="number" class="form-control medal-input" min="0" step="1"
                                value="0">
                        </div>
                        <div class="col-6 col-md-4 col-xl-3 form-group">
                            <label for="stone">Stone medal</label>
                            <input id="stone" type="number" class="form-control medal-input" min="0" step="1" value="0">
                        </div>
                        <div class="col-6 col-md-4 col-xl-3 form-group">
                            <label for="wood">Wood medal</label>
                            <input id="wood" type="number" class="form-control medal-input" min="0" step="1" value="0">
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-12 collapse-area result mb-2">
                <h2 class="collapse-header"><span class="header-title">RESULTS</span></h2>
                <div class="collapse show results" id="resultPanel">
                    <p>Current title: <span id="currentTitle">Brawler (Rank 1)</span></p>
                    <hr>
                    <p>Next title: <span id="nextTitle">Wild brawler (Rank 2)</span></p>
                    <hr>
                    <p>Minimum medals to rank up: <span id="medalAdvice">2x Gold</span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
    <script type="module" src="../../overviews/shared/ConsentInit.mjs"></script>
</body>

</html>
