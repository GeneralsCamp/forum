<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGE Food Production Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="../shared/calculators-shared.css">
    <link rel="stylesheet" href="styles.css">
    <meta property="og:title" content="Food Production Calculator | Generals Forum">
    <meta property="og:description" content="Calculate your in-game food production easily.">
    <meta property="og:image"
        content="https://generalscamp.github.io/forum/img_base/main_page/food-production-icon.webp">
</head>

<body>

    <div class="container">
        <a href="https://generalscamp.github.io/forum/" class="home-icon-link">
            <div class="home-icon">
                <i class="bi bi-house"></i>
            </div>
        </a>

        <h1 data-i18n="page_title">FOOD PRODUCTION CALCULATOR</h1>

        <div class="col-12 collapse-area mb-2 result">
            <h2 class="collapse-header">
                <span class="header-title" data-i18n="results">RESULTS</span>
            </h2>
            <div class="collapse show">
                <form class="calculator-bonuses-form row" onsubmit="return false;">
                    <div class="collapse show results">
                        <p class="il"><span class="result-label" data-game-lang="foodProductionPerHour">Food production per hour</span><span class="result-value" id="finalProduction">0 /hour</span></p>
                        <hr>
                        <p><span class="result-label" data-i18n="percentage_bonus">Percentage bonus</span><span id="percentBonus">-</span></p>
                        <hr>
                        <p><span class="result-label" data-i18n="fixed_bonus">Fixed production bonus</span><span id="constBonus">-</span></p>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-12 collapse-area mb-2">
            <h2 class="collapse-header">
                <span class="header-title" data-i18n="bonuses">BONUSES</span>
            </h2>
            <div class="collapse show">
                <form id="bonuses-form" class="calculator-bonuses-form" onchange="Calculate()">
                    <div class="row">
                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="location" data-i18n="location">Location</label>
                            <select id="location" class="form-select" onclick="LocationModify()">
                                <option value="main" data-i18n="main_castle">Main Castle</option>
                                <option value="op6" data-i18n="food_outpost_6">Food outpost 6</option>
                                <option value="op8" data-i18n="food_outpost_8">Food outpost 8</option>
                                <option value="kingdom" data-i18n="kingdoms">Kingdoms</option>
                            </select>
                        </div>
                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="villages" data-i18n="villages_bonus">Villages bonus</label>
                            <input required type="number" name="villages" id="villages" class="form-select"
                                placeholder="e.g. 400%" min="0">
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="res1" data-game-lang="research_47_title">Plow</label>
                            <select name="res1" id="res1" class="form-select">
                                <option value="0">None</option>
                                <option value="32">Level 1</option>
                                <option value="64">Level 2</option>
                                <option value="96">Level 3</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="res2" data-game-lang="research_14_title">Three-field crop rotation</label>
                            <select name="res2" id="res2" class="form-select">
                                <option value="0">None</option>
                                <option value="0.04">Level 1</option>
                                <option value="0.08">Level 2</option>
                                <option value="0.12">Level 3</option>
                                <option value="0.16">Level 4</option>
                                <option value="0.20">Level 5</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 form-group">
                            <label for="po" data-game-lang="publicOrder">Public order</label>
                            <input class="form-control" required type="number" name="po" id="po"
                                placeholder="e.g. 87600" min="0" step="1000">
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="coat" data-game-lang="emblem">Coat of arms</label>
                            <select class="form-select" name="coat" id="coat">
                                <option value="0">0%</option>
                                <option value="0.02">2%</option>
                                <option value="0.04">4%</option>
                                <option value="0.08">8%</option>
                                <option value="0.11">11%</option>
                                <option value="0.15">15%</option>
                                <option value="0.16">16%</option>
                                <option value="0.20">20%</option>
                                <option value="0.22">22%</option>
                                <option value="0.30">30%</option>
                                <option value="0.40">40%</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="vip-main" data-game-lang="dialog_VipScreen_tooltip_v2">VIP</label>
                            <select class="form-select" name="vip" id="vip-main">
                                <option value="0">Inactive</option>
                                <option value="0">Level 1</option>
                                <option value="0.05">Level 2</option>
                                <option value="0.05">Level 3</option>
                                <option value="0.1">Level 4</option>
                                <option value="0.15">Level 5</option>
                                <option value="0.2">Level 6</option>
                                <option value="0.3">Level 7</option>
                                <option value="0.3">Level 8</option>
                                <option value="0.3">Level 9</option>
                                <option value="0.3">Level 10</option>
                            </select>
                            <select class="form-select" name="vip" id="vip-op" style="display: none">
                                <option value="0">Inactive</option>
                                <option value="0">Level 1</option>
                                <option value="0">Level 2</option>
                                <option value="0">Level 3</option>
                                <option value="0">Level 4</option>
                                <option value="0.1">Level 5</option>
                                <option value="0.1">Level 6</option>
                                <option value="0.15">Level 7</option>
                                <option value="0.2">Level 8</option>
                                <option value="0.2">Level 9</option>
                                <option value="0.3">Level 10</option>
                            </select>
                            <select class="form-select" name="vip" id="vip-kingdom" style="display: none;">
                                <option value="0">Inactive</option>
                                <option value="0">Level 1</option>
                                <option value="0">Level 2</option>
                                <option value="0">Level 3</option>
                                <option value="0">Level 4</option>
                                <option value="0">Level 5</option>
                                <option value="0">Level 6</option>
                                <option value="0">Level 7</option>
                                <option value="0.05">Level 8</option>
                                <option value="0.15">Level 9</option>
                                <option value="0.3">Level 10</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="hunt-green" data-game-lang="dialog_hunter_title">Hunting</label>
                            <select class="form-select" name="hunt" id="hunt-green">
                                <option value="0.00">Disabled</option>
                                <option value="0.20">120%</option>
                            </select>
                            <select class="form-select" name="hunt" id="hunt-kingdom" style="display: none;">
                                <option value="0.00">Disabled</option>
                                <option value="0.30">130%</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="cast" data-game-lang="equipment_itemType_baron">Castellan</label>
                            <input class="form-control" type="number" name="cast" id="cast" placeholder="e.g. 2500"
                                min="0" max="20000" step="100">
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="deco1" data-game-lang="filter_decoType_effect">Effect decorations</label>
                            <input class="form-control" type="number" name="deco1" id="deco1" placeholder="e.g. 15000"
                                min="0" step="1000">
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="deco2"><span data-game-lang="filter_decoType_effect">Effect decorations</span> (%)</label>
                            <input class="form-control" type="number" name="deco2" id="deco2" placeholder="e.g. 40%"
                                min="0" step="5">
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="foodTCI" data-i18n="food_production_tci">Food production TCI</label>
                            <input class="form-control" type="number" name="foodTCI" id="foodTCI"
                                placeholder="e.g. 15000" min="0" step="1000">
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="beri" data-game-lang="nobilityTitles_singular">Gallantry title</label>
                            <select class="form-select" name="beri" id="beri">
                                <option value="0">Lower</option>
                                <option value="widowmaker" data-game-lang="playerTitle_108">the Widowmaker</option>
                                <option value="deathclaw" data-game-lang="playerTitle_111">the Deathclaw</option>
                                <option value="weaponmaster" data-game-lang="playerTitle_113">Weapon Master</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="overseer" data-game-lang="overseer">Overseer</label>
                            <select class="form-select" name="overseer" id="overseer">
                                <option value="0">No</option>
                                <option value="0.25">Yes</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="sub" data-game-lang="dialog_subscriptionHelp_playerSubscription_header">Player subscription</label>
                            <select class="form-select" name="sub" id="sub">
                                <option value="0">No</option>
                                <option value="0.1">Yes</option>
                            </select>
                        </div>

                        <div class="col-md-3 col-6 col-sm-4 col-lg-3 form-group">
                            <label for="mill" data-game-lang="mill_name">Flour mill</label>
                            <select class="form-select" name="mill" id="mill">
                                <option value="0">None</option>
                                <option value="0.10">Level 1</option>
                                <option value="0.20">Level 2</option>
                                <option value="0.30">Level 3</option>
                                <option value="0.40">Level 4</option>
                                <option value="0.50">Level 5</option>
                                <option value="0.60">Level 6</option>
                                <option value="0.65">Level 7</option>
                                <option value="0.70">Level 8</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="collapse-area buildings-header">
            <h2 class="collapse-header">
                <span class="header-title" data-i18n="buildings_items">BUILDINGS &amp; ITEMS</span>
            </h2>
        </div>

        <div id="buildings-container" class="row mb-2 p-1 pt-3"></div>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="../../overviews/shared/ConsentInit.mjs"></script>
</body>

</html>
