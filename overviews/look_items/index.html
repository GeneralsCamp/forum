<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGE Look-items</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.5.0/font/bootstrap-icons.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="./look_items.css">
  <link rel="stylesheet" href="../shared/consent.css">
  <meta property="og:title" content="Look-items Overview | Generals Forum">
  <meta property="og:description" content="This page loads the in-game look items automatically!">
  <meta property="og:image" content="https://generalscamp.github.io/forum/img_base/main_page/look-items.webp">
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-12 mb-2">
        <div class="col-12 page-title">
          <h1>GGE LOOK-ITEMS</h1>
        </div>

        <div id="topButtonsContainer">
          <a href="https://generalscamp.github.io/forum/" class="home-icon-link">
            <div class="home-icon">
              <i class="bi bi-house"></i>
            </div>
          </a>
        </div>

        <div class="row note gx-1 gy-1 align-items-center pb-2">
          <div class="col-md-6 col-sm-12 position-relative">
            <div class="input-group">
              <input id="searchInput" class="form-control custom-input" type="search"
                placeholder="Unavailable to search!" aria-label="Search" />
            </div>
          </div>
          <div class="col-md-6 col-sm-12">
            <select id="showFilter" class="form-select custom-select text-center" aria-label="Type filter">
              <option value="commander" selected>Show only commanders</option>
              <option value="castellan">Show only castellans</option>
            </select>
          </div>
        </div>

      </div>

      <main id="content" class="container-fluid">
        <div id="cards" class="row gx-1"></div>
      </main>
    </div>
  </div>

  <div id="imageModal" class="image-modal">
    <div class="image-modal-inner">
      <span class="image-modal-close">&times;</span>
      <img id="modalImage" class="image-modal-content" />
      <div id="modalCaption"></div>
    </div>
  </div>
  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
  <script type="module" src="script.js"></script>
  <script type="module" src="../shared/ConsentInit.mjs"></script>
</body>

</html>
