<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGE Event Plan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="icon" type="image/webp" href="../../img_base/favicon.ico">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.5.0/font/bootstrap-icons.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="../shared/modal.css">
  <link rel="stylesheet" href="./event_plan.css">
  <meta property="og:title" content="Event plan Overview | Generals Forum">
  <meta property="og:description" content="This page loads the event plans automatically!">
  <meta property="og:image" content="https://generalscamp.github.io/forum/img_base/main_page/event-plan-icon.webp">
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-12 mb-2">

        <div id="topButtonsContainer">
          <a href="https://generalscamp.github.io/forum/" class="home-icon-link">
            <div class="home-icon">
              <i class="bi bi-house"></i>
            </div>
          </a>
        </div>

        <div class="row note gx-1 gy-1 align-items-center pb-2">
          <div class="col-12">
            <select id="viewSelect" class="form-select custom-select text-center" aria-label="Views">
              <option value="" selected>Select view...</option>
            </select>
          </div>
        </div>

      </div>

      <main id="content" class="container-fluid">
      </main>
    </div>
  </div>

  <div id="eventPlanGameChoiceModal" class="gf-modal event-plan-game-choice-modal" aria-hidden="true">
    <div class="gf-modal-backdrop"></div>
    <div class="gf-modal-card event-plan-game-choice-card" role="dialog" aria-modal="true"
      aria-labelledby="eventPlanGameChoiceTitle">
      <div class="gf-modal-head">
        <h2 id="eventPlanGameChoiceTitle" class="gf-modal-title">Choose game</h2>
      </div>
      <div class="gf-modal-body event-plan-game-choice-body">
        <p id="eventPlanGameChoiceText">EM (computer) and E4K (mobile) games may use different data. Choose your game.</p>
        <select id="eventPlanGameChoiceSelect" class="form-select custom-select" aria-label="Choose game">
          <option value="empire">Empire (Browser)</option>
          <option value="e4k">Empire: Four Kingdoms (Mobile)</option>
        </select>
        <button id="eventPlanGameChoiceContinue" class="action-button primary" type="button">Continue</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
  <script type="module" src="../shared/ConsentInit.mjs"></script>
</body>

</html>
